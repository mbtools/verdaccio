#
# This is the default configuration file. It allows all users to do anything,
# please read carefully the documentation and best practices to
# improve security.
#
# Look here for more config file examples:
# https://github.com/verdaccio/verdaccio/blob/master/docker-examples/README.md
#
# Read about the best practices
# https://verdaccio.org/docs/best

# Path to a directory with all packages
storage: /verdaccio/storage/data

# Path to a directory with plugins to include, the plugins folder has the higher priority for loading plugins
# Disable this folder to avoid warnings if is not used
plugins: /verdaccio/plugins

# Web UI settings
# https://verdaccio.org/docs/webui
web:
  title: VERDACCIO_WEB_TITLE
  # Disable complete web UI
  enable: true
  # Custom colors for header background and font
  primaryColor: '#c0c0c0'
  # Custom logos and favicon
  logo: /verdaccio/conf/apm_banner.png
  logoDark: /verdaccio/conf/apm_banner_gray.png
  favicon: /verdaccio/conf/apm.ico
  # Disable gravatar support
  gravatar: true
  # By default, packages are ordered ascending
  sort_field: time
  sort_packages: desc
  # Convert your UI to the dark side
  darkMode: true
  # html_cache: true
  # By default, all features are displayed
  login: VERDACCIO_WEB_LOGIN
  showInfo: false
  showSettings: false
  # In combination with darkMode you can force specific theme
  # showThemeSwitch: true
  # showFooter: true
  # showSearch: true
  # showRaw: true
  # showDownloadTarball: true
  showUplinks: false
  #
  # HTML tags injected before ends </head>
  metaScripts:
    - '<meta name="description" content="apm - A Package Manager 📦, a Website 🌐, and a Registry 📑 for ABAP">'
  #
  # HTML tags injected as first child in <body>
  scriptsBodyBefore:
    - '<div id="apm-header"></div>'
  #
  # HTML tags injected as last child in </body>
  scriptsBodyAfter:
    - '<script src="/-/assets/apm.js"></script>'
  #
  # Public path for template manifest scripts (only manifest)
  publicPath: VERDACCIO_PUBLIC_URL
  pkgManagers:
    - apm
  rateLimit:
    windowMs: 60000 # 1 minute
    max: 100
  assetFolder: /verdaccio/conf

# Settings for authentication plugin
# https://verdaccio.org/docs/configuration#authentication
# auth:
#   htpasswd:
#     file: ./htpasswd
# Maximum amount of users allowed to register, defaults to "+inf".
# You can set this to -1 to disable registration.
# max_users: 1000

# A list of other known repositories we can talk to
# https://verdaccio.org/docs/configuration#uplinks
uplinks:
# None for apm

# Learn how to protect your packages
# https://verdaccio.org/docs/protect-your-dependencies/
# https://verdaccio.org/docs/configuration#packages
packages:
  '@*/*':
    access: VERDACCIO_PACKAGE_ACCESS
    publish: VERDACCIO_PACKAGE_PUBLISH
    unpublish: VERDACCIO_PACKAGE_UNPUBLISH
  '**':
    access: VERDACCIO_PACKAGE_ACCESS
    publish: VERDACCIO_PACKAGE_PUBLISH
    unpublish: VERDACCIO_PACKAGE_UNPUBLISH

# To improve your security configuration and avoid dependency confusion
# consider removing the proxy property for private packages
# https://verdaccio.org/docs/best#remove-proxy-to-increase-security-at-private-packages

# https://verdaccio.org/docs/configuration#server
# You can specify HTTP/1.1 server keep alive timeout in seconds for incoming connections.
# A value of 0 makes the http server behave similarly to Node.js versions prior to 8.0.0, which did not have a keep-alive timeout.
# WORKAROUND: Through given configuration you can workaround following issue https://github.com/verdaccio/verdaccio/issues/301. Set to 0 in case 60 is not enough.
server:
  rateLimit:
    windowMs: 60000 # 1 minute
    max: 100
  keepAliveTimeout: 60
  # Controls how requests with dotfile path segments (e.g. /.env, /.well-known/) are handled.
  # 'deny' returns 403, 'ignore' returns 404 (default), 'allow' passes through.
  dotfiles: ignore
  # Hide static file requests (/-/static/*) from pino logs.
  # They remain visible via DEBUG=verdaccio:middleware:log.
  hideStaticLogs: true
  # The pluginPrefix replaces the default plugins prefix which is `verdaccio`. Please don't include `-`. If `something` is provided
  # the resolved package will be `something-xxxx`.
  # pluginPrefix: something
  # Password rules for apm:
  # - 8–64 characters
  # - at least one lowercase a-z
  # - at least one uppercase A-Z
  # - at least one digit
  # - at least one special character
  # - no whitespace anywhere
  # passwordValidationRegex: /^(?=.{8,64}$)(?=.*[a-z])(?=.*[A-Z])(?=.*\d)(?=.*[^A-Za-z0-9\s])(?=\S+$).+$/
  # Allow `req.ip` to resolve properly when Verdaccio is behind a proxy or load-balancer
  # https://expressjs.com/en/guide/behind-proxies.html
  # Cloudflare -> DigitalOcean -> Verdaccio
  trustProxy: '100.127.0.0/16'

# https://verdaccio.org/docs/configuration#offline-publish
publish:
  # allow_offline: false
  check_owners: true
  keep_readmes: all

# Define public URL of registry in combination with VERDACCIO_PUBLIC_URL environment variable
# https://verdaccio.org/docs/configuration#url-prefix
# url_prefix: /verdaccio/
#
# Examples:
# VERDACCIO_PUBLIC_URL='https://somedomain.org'
# url_prefix: '/my_prefix'
# // url -> https://somedomain.org/my_prefix/
#
# VERDACCIO_PUBLIC_URL='https://somedomain.org'
# url_prefix: '/'
# // url -> https://somedomain.org/
#
# VERDACCIO_PUBLIC_URL='https://somedomain.org/first_prefix'
# url_prefix: '/second_prefix'
# // url -> https://somedomain.org/second_prefix/
url_prefix: '/'

# Security settings
# https://verdaccio.org/docs/configuration#security
security:
  api:
    legacy: false
    jwt:
      sign:
        expiresIn: 30d
  #       verify:
  #         someProp: [value]
  web:
    sign:
      expiresIn: 1h # 1 hour by default
#     verify:
#       someProp: [value]

# https://verdaccio.org/docs/configuration#user-rate-limit
userRateLimit:
  windowMs: 60000 # 1 minute
  max: 20

# https://verdaccio.org/docs/configuration#max-body-size
max_body_size: 2mb

# https://verdaccio.org/docs/configuration#listen-port
# listen:
#   - localhost:4873            # default value
#   - http://localhost:4873     # same thing
#   - 0.0.0.0:4873              # listen on all addresses (INADDR_ANY)
#   - https://example.org:4873  # if you want to use https
#   - "[::1]:4873"              # ipv6
#   - unix:/tmp/verdaccio.sock  # unix socket

# The HTTPS configuration is useful if you do not consider use a HTTP Proxy
# https://verdaccio.org/docs/configuration#https
# https:
#   key: ./path/verdaccio-key.pem
#   cert: ./path/verdaccio-cert.pem
#   ca: ./path/verdaccio-csr.pem

# https://verdaccio.org/docs/configuration#proxy
# http_proxy: http://something.local/
# https_proxy: https://something.local/
# no_proxy: localhost,127.0.0.1,server.local

# https://verdaccio.org/docs/configuration#notifications
# notify:
#   method: 'POST'
#   headers: '[{ "Content-Type": "application/json" }]'
#   endpoint: 'https://usagge.hipchat.com/v2/room/3729485/notification?auth_token=mySecretToken'
#   content: '{"color":"green","message":"New package published: * {{ name }}*","notify":true,"message_format":"text"}'

# Settings for middleware plugins
# https://verdaccio.org/docs/plugins#middleware-configuration
# middlewares:
#   audit:
#     enabled: true
# timeout: 10000

# Log settings
# https://verdaccio.org/docs/logger
# Redaction: https://getpino.io/#/docs/redaction
# Synchronous logging: https://getpino.io/#/docs/asynchronous
log:
  type: stdout
  format: pretty
  level: http
  # redact:
  #   paths:
  #     [
  #       'req.header.authorization',
  #       'req.header.cookie',
  #       'req.remoteAddress',
  #       'req.remotePort',
  #       'ip',
  #       'remoteIP',
  #       'user'
  #     ]
  #   censor: '<redacted>'
  # sync: true

# Feature flags (experimental settings that can be changed or removed in the future)
# https://verdaccio.org/docs/configuration#experiments
# experiments:
#  # Support for npm token command
#  token: false
#  # Enable tarball URL redirect for hosting tarball with a different server.
#  # The tarball_url_redirect can be a template string
#  tarball_url_redirect: 'https://mycdn.com/verdaccio/${packageName}/${filename}'
#  # The tarball_url_redirect can be a function, takes packageName and filename and returns the url,
#  # when working with a js configuration file
#  tarball_url_redirect(packageName, filename) {
#    const signedUrl = // generate a signed url
#    return signedUrl;
#  }
# Renamed from "experiments" to "flags" in next major release
# flags:
#  changePassword: true
#  searchRemote: true

# Translate your registry, API and web UI
# List of the available translations https://github.com/verdaccio/verdaccio/blob/master/packages/plugins/ui-theme/src/i18n/ABOUT_TRANSLATIONS.md
i18n:
  web: en-US

###
### PLUGINS
###

auth:
  '@verdaccio-pro/clerk':
    clerk_secret_key: CLERK_SECRET_KEY

middlewares:
  '@verdaccio-pro/middleware':
    enabled: VERDACCIO_MIDDLEWARE_ENABLED
    userAgent: VERDACCIO_MIDDLEWARE_USER_AGENT
    httpLog: VERDACCIO_MIDDLEWARE_HTTP_LOG
    corsAllowedOrigins:
      - https://playground.abappm.com
      - https://registry.abappm.com

store:
  '@verdaccio-pro/storage-sql':

###
### DEBUG
###

_debug: VERDACCIO_DEBUG
